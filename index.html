<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Aguarde…</title>

  <!-- FACEBOOK PIXEL -->
  <script>
    !function(f,b,e,v,n,t,s){
      if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s);
    }(window,document,'script','/facebook/events.js');
    fbq('init', 'SEU_PIXEL_ID');   // <-- troque aqui
    // NÃO dispara PageView ainda
  </script>

  <style>
    html,body{height:100%;margin:0;background:#111;color:#fff;font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center;}
    #box{background:#222;padding:30px;border-radius:8px;text-align:center;}
    #timer{font-size:42px;margin:20px 0;}
    #btn{background:#0c6;color:#fff;border:0;padding:12px 24px;font-size:18px;border-radius:4px;cursor:pointer;opacity:.3;pointer-events:none;}
  </style>
</head>

<body>
  <div id="box">
    <h2>Preparando seu acesso…</h2>
    <div id="timer">20</div>
    <button id="btn" onclick="irParaOferta()">Continuar</button>
  </div>

<script>
  const TEMPO = 20;               // segundos exigidos
  let restante = TEMPO;

  /* bloqueio de saída rápida */
  window.onbeforeunload = () => "Aguarde mais um instante…";

  /* cronômetro */
  const tick = setInterval(() => {
    restante--;
    document.getElementById('timer').textContent = restante;
    if (restante <= 0) {
      clearInterval(tick);
      liberaBotao();
    }
  }, 1000);

  function liberaBotao() {
    const btn = document.getElementById('btn');
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';

    /* dispara PageView SÓ agora */
    fbq('track', 'PageView');

    /* remove bloqueio de saída */
    window.onbeforeunload = null;
  }

  function irParaOferta() {
    /* redireciona para o link real após o gate */
    location.href = 'https://www.mi-malist.com/doc_R2NhYUNmY3NseFU3NndjUzlETGZFUT09';
  }
</script>
</body>
</html>
