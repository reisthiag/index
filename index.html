<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carregando Oferta...</title>
<style>
html, body { margin: 0; height: 100%; overflow: hidden; background: #050505; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
iframe { width: 100%; height: 100%; border: none; display: none; }

#overlay {
position: fixed; left: 0; top: 0; width: 100vw; height: 100vh;
background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;
z-index: 9999; user-select: none; cursor: wait;
}

.loader-box { text-align: center; padding: 20px; border: 1px solid #333; border-radius: 8px; background: rgba(0,0,0,0.8); box-shadow: 0 0 20px rgba(0, 255, 255, 0.1); }
h3 { margin: 0 0 15px 0; font-size: 18px; color: #ccc; text-transform: uppercase; letter-spacing: 1px; }
#timer { font-size: 64px; font-weight: 800; color: #0ff; text-shadow: 0 0 15px rgba(0, 255, 255, 0.6); line-height: 1; }
#status { margin-top: 15px; font-size: 14px; color: #666; }
.blink { animation: pulse 0.5s infinite alternate; }
@keyframes pulse { from { opacity: 1; text-shadow: 0 0 15px rgba(0,255,255,0.6); } to { opacity: 0.6; text-shadow: 0 0 5px rgba(0,255,255,0.2); } }

/* Elemento invisível para capturar cliques simulados */
.click-target { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 9998; }
</style>
</head>
<body>

<!-- Iframe de destino (oculto até o fim) -->
<iframe id="targetFrame" src="https://www.mi-malist.com/doc_eGFBeUJlTVlRRnhzMnYrdHR6ZUpoQT09"></iframe>

<!-- Overlay de espera -->
<div id="overlay">
<div class="loader-box">
<h3>Preparando seu acesso exclusivo</h3>
<div id="timer">20</div>
<div id="status">Verificando segurança...</div>
</div>
</div>

<!-- Área fantasma para simular cliques -->
<div id="clickZone" class="click-target"></div>

<script>
(function() {
// Configurações
const BASE_WAIT = 20; // Segundos base
const VARIANCE = 2000; // Variação aleatória (+/- 2s)
const PING_TIME = 10000; // Ping aos 10s

let timeLeft = BASE_WAIT;
const timerEl = document.getElementById('timer');
const statusEl = document.getElementById('status');
const overlay = document.getElementById('overlay');
const frame = document.getElementById('targetFrame');
const clickZone = document.getElementById('clickZone');

let isRunning = true;
let mouseInterval, scrollInterval, clickInterval;

// 1. Simulação de Movimento de Mouse (Curvas Suaves)
function simulateMouse() {
if (!isRunning) return;

const startX = window.innerWidth / 2;
const startY = window.innerHeight / 2;
const targetX = Math.random() * window.innerWidth;
const targetY = Math.random() * window.innerHeight;
const duration = 1000 + Math.random() * 1000; // 1-2s por movimento
const startTime = performance.now();

function move(timestamp) {
if (!isRunning) return;
const elapsed = timestamp - startTime;
const progress = Math.min(elapsed / duration, 1);

// Ease-in-out para naturalidade
const ease = progress <.5? 2 * progress * progress: -1 + (4 - 2 * progress) * progress;

const currentX = startX + (targetX - startX) * ease;
const currentY = startY + (targetY - startY) * ease;

// Dispatch de evento mousemove
const evt = new MouseEvent('mousemove', {
view: window,
bubbles: true,
cancelable: true,
clientX: currentX,
clientY: currentY
});
document.dispatchEvent(evt);

if (progress < 1) requestAnimationFrame(move);
else setTimeout(simulateMouse, 500 + Math.random() * 1000); // Pausa entre movimentos
}
requestAnimationFrame(move);
}

// 2. Simulação de Scroll (Mesmo com overflow:hidden, o evento conta)
function simulateScroll() {
if (!isRunning) return;
const scrollAmount = (Math.random() * 100) - 50; // Sobe ou desce
window.scrollBy(0, scrollAmount);
setTimeout(simulateScroll, 2000 + Math.random() * 3000);
}

// 3. Simulação de Cliques (Impaciência)
function simulateClicks() {
if (!isRunning) return;
const rect = clickZone.getBoundingClientRect();
const x = Math.random() * rect.width;
const y = Math.random() * rect.height;

const evtDown = new MouseEvent('mousedown', { bubbles: true, clientX: x, clientY: y, button: 0 });
const evtUp = new MouseEvent('mouseup', { bubbles: true, clientX: x, clientY: y, button: 0 });
const evtClick = new MouseEvent('click', { bubbles: true, clientX: x, clientY: y, button: 0 });

clickZone.dispatchEvent(evtDown);
setTimeout(() => {
clickZone.dispatchEvent(evtUp);
clickZone.dispatchEvent(evtClick);
}, 100 + Math.random() * 100);

setTimeout(simulateClicks, 3000 + Math.random() * 4000);
}

// Iniciar simulações
mouseInterval = setTimeout(simulateMouse, 500);
scrollInterval = setTimeout(simulateScroll, 1500);
clickInterval = setTimeout(simulateClicks, 2500);

// Lógica do Timer
const totalWait = (BASE_WAIT * 1000) + (Math.random() * VARIANCE) - (VARIANCE / 2);

const countdown = setInterval(() => {
if (!isRunning) { clearInterval(countdown); return; }

timeLeft--;
if (timeLeft < 0) timeLeft = 0;

timerEl.textContent = timeLeft;

if (timeLeft <= 5) {
timerEl.classList.add('blink');
statusEl.textContent = "Quase lá...";
statusEl.style.color = "#0ff";
} else if (timeLeft === 10) {
statusEl.textContent = "Validando dispositivo...";
}

if (timeLeft === 0) {
clearInterval(countdown);
finishProcess();
}
}, 1000);

// Ping de conversão (10s)
setTimeout(() => {
if (!isRunning) return;
const urlParams = new URLSearchParams(window.location.search);
const cid = urlParams.get("cid");
if (cid) {
// Fetch sem bloquear CORS se possível, ou Image beacon
try {
fetch(`https://seudominio.com/ping.php?cid=${encodeURIComponent(cid)}`, { mode: 'no-cors' });
} catch (e) {
new Image().src = `https://seudominio.com/ping.php?cid=${encodeURIComponent(cid)}`;
}
}
}, PING_TIME);

// Finalização
function finishProcess() {
isRunning = false;

// Parar simulações
clearTimeout(mouseInterval);
clearTimeout(scrollInterval);
clearTimeout(clickInterval);

// Liberar UI
overlay.style.opacity = '0';
overlay.style.transition = 'opacity 0.5s ease';
setTimeout(() => {
overlay.style.display = 'none';
clickZone.remove();
frame.style.display = 'block';

// Disparar Pixels Finais
if (typeof fbq === 'function') {
fbq('track', 'PageView');
fbq('track', 'CompleteRegistration'); // Ou evento específico
}

// Pixel externo
new Image().src = "https://www.mi-malist.com/pixel.gif?t=" + Date.now();

// Scroll final para garantir métrica de profundidade
window.scrollTo(0, document.body.scrollHeight);

}, 500);
}

// Bloqueio de saída (opcional, mantém a pressão)
window.onbeforeunload = function(e) {
if (isRunning) {
e.preventDefault();
e.returnValue = '';
}
};

// Previne menu de contexto para evitar que o usuário veja que é um script
document.addEventListener('contextmenu', event => event.preventDefault());

})();
</script>
</body>
</html>
