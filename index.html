<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <title>Redirecionamento Sequencial</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#000}
    iframe{width:100%;height:100%;border:none;display:none}
    #ov{position:fixed;left:0;top:0;width:100vw;height:100vh;background:#000 url(data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjQwIiBoZWlnaHQ9IjQwIiBmaWxsPSIjMTExIi8+PC9zdmc+) repeat;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font:24px/1.2 sans-serif;user-select:none}
    #cnt{font-size:80px;font-weight:700;color:#0ff;text-shadow:0 0 10px #0ff}
    #ov.blink{animation:blink .3s infinite}
    @keyframes blink{50%{opacity:.3}}
    #status{margin-top:15px;font-size:14px;color:#aaa}
  </style>
</head>
<body>

  <!-- Iframe único que será reutilizado para todos os links -->
  <iframe id="frm" src="about:blank"></iframe>

  <div id="ov">
    <h3>AGUARDE 20 s → ACESSO LIBERADO</h3>
    <div id="cnt">20</div>
    <div id="msg">Não saia: você perderá a recompensa.</div>
    <div id="status">Preparando sequência...</div>
  </div>

  <script>
    // Lista de links fornecida
    const links = [
      "https://www.mi-malist.com/doc_aUZrdzFZT2Z4eUxwQm1oWmJRSG1oUT09",
      "https://www.mi-malist.com/doc_YUYrNDlkNk85NlpyT0QybmRRNlJTdz09",
      "https://www.mi-malist.com/doc_UkhvSGo4Uksrd1Rxb1pCSDIzVCs0dz09",
      "https://www.mi-malist.com/doc_alRFUHpzZndDS2E4YVBNWm56d2NSQT09",
      "https://www.mi-malist.com/doc_VkNma3l3RTR5dXRzdkRDT21EUkpNUT09",
      "https://www.mi-malist.com/doc_UHZaQjJEMlVpa1JqQzJYNTE0R04vZz09",
      "https://www.mi-malist.com/doc_cUpuOUM2dXNtS1MzVTFkM2RXQ3lZUT09",
      "https://www.mi-malist.com/doc_YVVsUytVem5sczJqMkJXZ3h3Mk9ZQT09",
      "https://www.mi-malist.com/doc_cC8wbnVBTXBpay8rZHE0NnhneW14QT09",
      "https://www.mi-malist.com/doc_dEYrNmVjWGY4bElubjFsTUJQZEVPZz09"
    ];

    let currentIndex = 0;
    const frameTime = 20000; // 20 segundos por link
    
    /* Bloqueios de segurança */
    let blk = 1;
    window.onbeforeunload = () => blk ? 'Timer ativo: sair cancela o prêmio' : null;
    ['touchmove','wheel','contextmenu'].forEach(e =>
      document.addEventListener(e, ev => ev.preventDefault(), {passive:false}));

    /* Elementos DOM */
    let n = 20;
    const elCnt = document.getElementById("cnt");
    const ov = document.getElementById("ov");
    const frm = document.getElementById("frm");
    const statusDiv = document.getElementById("status");

    /* Contagem Regressiva Inicial (Gate de 20s) */
    const timerGate = setInterval(() => {
      if (n > 0) {
        elCnt.textContent = --n;
        if (n <= 3) ov.classList.add('blink');
      }
    }, 1000);

    /* Ping aos 10s */
    setTimeout(() => {
      const cid = new URLSearchParams(location.search).get("cid");
      if (cid) {
        try { fetch("https://seudominio.com/ping.php?cid="+encodeURIComponent(cid)); } catch(e){}
      }
    }, 10000);

    /* Função para carregar o próximo link */
    function loadNextLink() {
      if (currentIndex >= links.length) {
        // Fim da lista: mantém o último ou reinicia (opcional). Aqui paramos.
        statusDiv.textContent = "Sequência finalizada.";
        ov.classList.remove('blink');
        ov.querySelector('h3').textContent = "CONCLUÍDO";
        elCnt.style.display = 'none';
        return;
      }

      // Atualiza status visual
      statusDiv.textContent = `Carregando link ${currentIndex + 1} de ${links.length}...`;
      
      // Troca a URL do iframe
      frm.src = links[currentIndex];
      frm.style.display = 'block'; // Garante que está visível
      
      // Dispara pixels de rastreamento a cada troca (simulando nova view)
      if(typeof fbq === "function") fbq("track", "PageView");
      new Image().src = "https://www.mi-malist.com/pixel.gif?t=" + Date.now() + "&idx=" + currentIndex;

      currentIndex++;
    }

    /* Liberação após 20s iniciais */
    setTimeout(() => {
      blk = 0; // Libera F5
      clearInterval(timerGate);
      
      // Esconde o overlay apenas se quiser que o usuário veja o conteúdo imediatamente
      // Se quiser manter o overlay com o contador da sequência, remova a linha abaixo.
      // Para este caso, vou manter o overlay minimalista ou remover totalmente dependendo da UX desejada.
      // Opção A: Remove overlay totalmente para mostrar os links.
      ov.remove(); 
      
      // Inicia o primeiro link imediatamente
      loadNextLink();

      // Agenda os próximos links
      const sequenceTimer = setInterval(loadNextLink, frameTime);
      
    }, 20000);
  </script>
</body>
</html>
