<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carregando...</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #f4f4f4; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; }
        
        /* Animação FORÇADA para manter o navegador acordado */
        @keyframes keepAlive {
            0% { transform: translateZ(0); }
            100% { transform: translateZ(1px); }
        }
        .wrapper { animation: keepAlive 0.1s infinite linear; }

        .card { background: #fff; padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); text-align: center; max-width: 380px; width: 90%; position: relative; z-index: 10; }
        
        .spinner {
            width: 50px; height: 50px; border: 5px solid #e0e0e0; border-top: 5px solid #28a745; border-radius: 50%;
            margin: 0 auto 20px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        h2 { margin: 0 0 10px; color: #222; font-size: 20px; font-weight: 700; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; line-height: 1.4; }
        
        .timer-display { font-size: 42px; font-weight: 800; color: #333; font-variant-numeric: tabular-nums; margin: 15px 0; letter-spacing: -1px; }
        
        .progress-bg { width: 100%; height: 10px; background: #eee; border-radius: 10px; overflow: hidden; margin: 20px 0; position: relative; }
        .progress-fill { height: 100%; background: #28a745; width: 0%; border-radius: 10px; transform: translateZ(0); } /* Transform acelera GPU */

        .btn {
            background: #ccc; color: #666; border: none; padding: 16px; font-size: 16px; font-weight: bold;
            border-radius: 8px; width: 100%; cursor: not-allowed; transition: all 0.3s; text-transform: uppercase;
        }
        .btn.ready {
            background: #28a745; color: #fff; cursor: pointer; box-shadow: 0 5px 20px rgba(40, 167, 69, 0.4);
            animation: pulseBtn 2s infinite;
        }
        @keyframes pulseBtn { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <div class="spinner"></div>
        <h2>Verificando segurança...</h2>
        <p>Seu acesso está sendo preparado. Não feche esta janela.</p>
        
        <div class="timer-display" id="timerText">25</div>
        
        <div class="progress-bg">
            <div class="progress-fill" id="progFill"></div>
        </div>

        <button class="btn" id="finalBtn">Aguarde...</button>
    </div>
</div>

<script>
    // CONFIGURAÇÃO
    const DESTINO = "https://shrtslug.biz/8NS3x"; 
    const TEMPO_ESPERA = 20; // Segundos
    
    let inicioTempo = Date.now();
    let fimTempo = inicioTempo + (TEMPO_ESPERA * 1000);
    let liberado = false;

    const elTimer = document.getElementById('timerText');
    const elFill = document.getElementById('progFill');
    const elBtn = document.getElementById('finalBtn');

    function loop() {
        let agora = Date.now();
        let restante = Math.max(0, Math.ceil((fimTempo - agora) / 1000));
        
        // Atualiza texto
        elTimer.innerText = restante;
        
        // Atualiza barra
        let totalPassado = agora - inicioTempo;
        let porcentagem = Math.min(100, (totalPassado / (TEMPO_ESPERA * 1000)) * 100);
        elFill.style.width = porcentagem + '%';

        if (restante <= 0 && !liberado) {
            liberar();
        } else if (!liberado) {
            // Usa requestAnimationFrame para máxima prioridade de renderização
            requestAnimationFrame(loop);
        }
    }

    function liberar() {
        liberado = true;
        elTimer.innerText = "0";
        elFill.style.width = "100%";
        elBtn.innerText = "LIBERAR ACESSO";
        elBtn.className = "btn ready";
        elBtn.disabled = false;
        
        // Ação automática imediata
        window.location.href = DESTINO;
    }

    // Inicia o loop
    requestAnimationFrame(loop);

    // Segurança extra: Caso a aba volte do fundo, recalcula
    document.addEventListener("visibilitychange", () => {
        if (!liberado && document.visibilityState === 'visible') {
            // Recalcula o fim baseado no tempo real perdido
            let tempoPerdido = Date.now() - inicioTempo;
            // Apenas garante que o loop continue rodando
            requestAnimationFrame(loop);
        }
    });

    // Bloqueio de saída
    window.onbeforeunload = (e) => {
        if (!liberado) {
            e.preventDefault();
            e.returnValue = '';
            return 'A validação ainda está em andamento.';
        }
    };
</script>

</body>
</html>
