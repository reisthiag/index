<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <title>Gate 20s</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#000;color:#fff;font:24px/1.2 sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center}
    #cnt{font-size:90px;font-weight:700;color:#0ff;text-shadow:0 0 12px #0ff}
  </style>
</head>
<body>
  <div id="ov">
    <h3>AGUARDE 20 s → SEU LINK EXCLUSIVO</h3>
    <div id="cnt">20</div>
  </div>

  <script>
    /* bloqueios rápidos */
    window.oncontextmenu=()=>!1;
    ["touchmove","wheel"].forEach(e=>document.addEventListener(e,evt=>evt.preventDefault(),{passive:!0}));

    /* contador */
    let n=20,el=document.getElementById("cnt");
    const t=setInterval(()=>{if(n>0)el.textContent=--n;},1000);

    /* redireciona tudo após 20 s */
    setTimeout(()=>{
      clearInterval(t);
      window.location.replace("http://likevideo16.com/news_bkR1dC9RUmtHNUtOajFjaGU5YjlzUT09");
    },20000);
  </script>
</body>
</html>
