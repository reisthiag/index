<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Conteúdo...</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Impede rolagem */
            background-color: #fff;
            font-family: Arial, sans-serif;
        }

        /* CAMADA 1: O SITE DE NOTÍCIAS (Fica no fundo, tentando carregar) */
        #target-site {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
            /* Se o site bloquear iframe, isso pode ficar branco, mas a camada de cima cobre */
        }

        /* CAMADA 2: A MÁSCARA DE BLOQUEIO (Fica na frente, segurando o usuário) */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85); /* Fundo escuro transparente */
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            backdrop-filter: blur(5px); /* Efeito de vidro fosco para ver vultos atrás */
        }

        #timer-display {
            font-size: 60px;
            font-weight: bold;
            color: #ff3b30;
            background: #fff;
            padding: 20px 40px;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(255, 59, 48, 0.6);
            margin-bottom: 20px;
            animation: pulse 1s infinite;
        }

        #message {
            font-size: 18px;
            text-align: center;
            max-width: 80%;
            line-height: 1.5;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- 1. O SITE REAL CARREGANDO POR TRÁS (Inicia imediatamente) -->
    <iframe id="target-site" src=""></iframe>

    <!-- 2. A TELA DE RETENÇÃO (Cobre o site e segura o usuário) -->
    <div id="overlay">
        <div id="timer-display">20</div>
        <div id="message">
            Aguarde...<br>
            Carregando vídeo e imagens de alta qualidade.<br>
            Você será redirecionado automaticamente.
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO ---
        // Coloque aqui o link EXATO da notícia
        const URL_DESTINO = "https://verdadeiranatureza.com/2026/04/09/novo-affair-ana-castela-e-vista-com-ex-de-famosa-influenciadora-veja/?utm_campaign=1891&utm_medium=42810899&utm_term=1503&utm_source=98323c3a64ed5";
        
        const TEMPO_SEGUNDOS = 20;
        // -------------------

        const iframe = document.getElementById('target-site');
        const timerEl = document.getElementById('timer-display');
        const overlay = document.getElementById('overlay');
        let tempoRestante = TEMPO_SEGUNDOS;

        // 1. INICIA O CARREGAMENTO DO SITE IMEDIATAMENTE
        // Isso faz o servidor da notícia começar a contar o tempo de visita AGORA.
        iframe.src = URL_DESTINO;

        // 2. TRAVA O USUÁRIO NA PÁGINA (Impede fechar ou voltar)
        window.onbeforeunload = function() {
            return "Se você sair agora, o conteúdo não será carregado.";
        };

        // Impede teclas de atalho (F5, Back)
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F5' || (e.ctrlKey && e.key === 'r') || (e.altKey && e.key === 'ArrowLeft')) {
                e.preventDefault();
            }
        });

        // 3. LÓGICA DO CRONÔMETRO
        const contador = setInterval(() => {
            tempoRestante--;
            timerEl.innerText = tempoRestante;

            if (tempoRestante <= 0) {
                clearInterval(contador);
                
                // Fim do tempo: Remove a máscara
                overlay.style.display = 'none';
                
                // Libera a navegação
                window.onbeforeunload = null;

                // GARANTIA EXTRA: Se o iframe estiver branco (bloqueio do site),
                // forçamos o redirecionamento total da janela para garantir que o usuário veja a notícia.
                // Se o iframe funcionou, isso apenas recarrega a página já na notícia.
                // Isso resolve o erro de "tela preta" ou "conexão recusada" definitivamente.
                window.location.href = URL_DESTINO;
            }
        }, 1000);
    </script>
</body>
</html>
