<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Conteúdo...</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* CAMADA 1: O SITE DE NOTÍCIAS (Carrega por trás imediatamente) */
        #target-site {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* CAMADA 2: MÁSCARA DE RETENÇÃO (Fica na frente) */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.88); /* Fundo escuro */
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            backdrop-filter: blur(8px); /* Efeito vidro fosco */
        }

        #timer-box {
            background: #fff;
            color: #333;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 59, 48, 0.4);
            max-width: 90%;
            width: 350px;
        }

        #timer-display {
            font-size: 64px;
            font-weight: 800;
            color: #ff3b30;
            line-height: 1;
            margin-bottom: 15px;
        }

        #message {
            font-size: 16px;
            color: #555;
            line-height: 1.4;
            font-weight: 500;
        }

        .warning-icon {
            font-size: 24px;
            color: #ff3b30;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <!-- 1. IFRAME OCULTO (Carrega a notícia nos bastidores) -->
    <iframe id="target-site" src=""></iframe>

    <!-- 2. TELA DE BLOQUEIO -->
    <div id="overlay">
        <div id="timer-box">
            <span class="warning-icon">⚠️ Aguarde</span>
            <div id="timer-display">20</div>
            <div id="message">
                Carregando mídia segura...<br>
                Não feche esta janela ou o conteúdo será perdido.
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO ---
        const URL_DESTINO = "https://verdadeiranatureza.com/2026/04/09/novo-affair-ana-castela-e-vista-com-ex-de-famosa-influenciadora-veja/?utm_campaign=1891&utm_medium=42810899&utm_term=1503&utm_source=98323c3a64ed5";
        const TEMPO_SEGUNDOS = 20;
        // -------------------

        const iframe = document.getElementById('target-site');
        const timerEl = document.getElementById('timer-display');
        const overlay = document.getElementById('overlay');
        let tempoRestante = TEMPO_SEGUNDOS;
        let liberado = false;

        // 1. INICIA CARREGAMENTO IMEDIATO (Gera engajamento no servidor de destino)
        iframe.src = URL_DESTINO;

        // 2. TRAVA DE SAÍDA (O "PULO DO GATO" QUE VOCÊ PEDIU)
        // Isso força o alerta nativo do navegador ao clicar no X ou tentar fechar a aba
        window.onbeforeunload = function(e) {
            if (!liberado) {
                // Navegadores modernos ignoram o texto customizado e mostram o padrão:
                // "As alterações que você fez podem não ser salvas. Deseja sair?"
                // Mas a função de bloquear o fechamento funciona.
                e.preventDefault(); 
                e.returnValue = '';
                return '';
            }
        };

        // Impede teclas de atalho (F5, Back, Alt+F4 em alguns casos)
        document.addEventListener('keydown', function(e) {
            if (!liberado) {
                if (e.key === 'F5' || (e.ctrlKey && e.key === 'r') || (e.altKey && e.key === 'ArrowLeft')) {
                    e.preventDefault();
                }
            }
        });

        // 3. CRONÔMETRO
        const contador = setInterval(() => {
            tempoRestante--;
            timerEl.innerText = tempoRestante;

            if (tempoRestante <= 0) {
                clearInterval(contador);
                liberado = true; // Libera a saída
                
                // Remove a trava de fechamento
                window.onbeforeunload = null;

                // Remove a máscara visualmente
                overlay.style.opacity = '0';
                overlay.style.transition = 'opacity 0.5s ease';
                
                setTimeout(() => {
                    overlay.style.display = 'none';
                    // Força redirecionamento final para garantir que o site apareça limpo
                    window.location.href = URL_DESTINO;
                }, 500);
            }
        }, 1000);
    </script>
</body>
</html>
